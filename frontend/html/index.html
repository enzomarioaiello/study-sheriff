<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Sheriff — Moderator Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="dashboard-shell">
    <main class="workspace">
      <section class="camera-panel" id="camera-section" aria-label="Live camera">
        <div class="camwrap">
          <img id="video-feed" src="/video_feed" alt="Live annotated camera feed">
          <div class="badge live">
            <span class="dot" id="rec-dot"></span>
            <span id="live-label">STARTING</span>
          </div>
          <div class="badge fps" id="fps-badge">-- FPS</div>
          <div class="freeze" id="freeze-banner">
            <span class="freeze-icon" aria-hidden="true">!</span>
            <span id="freeze-text">Camera signal lost &mdash; last frame frozen</span>
          </div>
        </div>
      </section>

      <aside class="side-stack" aria-label="Monitoring details">
        <section class="activity-summary" id="activity-section" aria-label="Current activity summary">
          <div class="section-heading">
            <div>
              <h2>Current activity</h2>
            </div>
            <span class="section-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 15.5 8.5 11l3 3L20 5.5"/>
                <path d="M15 5.5h5v5"/>
              </svg>
            </span>
          </div>

          <div class="people-activity" aria-live="polite">
            <h3>Detected people</h3>
            <div class="people-activity-list" id="people-activity-list"></div>
          </div>

          <div class="metric-grid" id="metric-grid"></div>

          <div class="diagnostics-footer">
            <button class="diagnostics-button" type="button" data-open-dialog="diagnostics-modal">
              Diagnostics
            </button>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <dialog class="modal diagnostics-modal" id="diagnostics-modal" aria-labelledby="diagnostics-title">
    <div class="modal-card">
      <div class="modal-heading">
        <div>
          <p class="eyebrow">System health</p>
          <h2 id="diagnostics-title">Diagnostics</h2>
          <p>Live pipeline and camera information.</p>
        </div>
        <button class="close-button" type="button" data-close-dialog aria-label="Close diagnostics">
          Close
        </button>
      </div>

      <section class="diagnostics-panel" aria-label="System diagnostics">
        <div class="alert" id="alert-box" role="status">
          <span class="alert-icon" aria-hidden="true">!</span>
          <span id="alert-text"></span>
        </div>
        <div class="panel-heading">
          <div>
            <h2>System diagnostics</h2>
            <p>Pipeline and camera status</p>
          </div>
          <span class="panel-kicker">Live</span>
        </div>
        <table>
          <tbody id="health-table"></tbody>
        </table>
      </section>
    </div>
  </dialog>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
